# Uncomment to enable the display
CONFIG_ZMK_DISPLAY=y

# Uncomment to invert display colors (white-on-black)
# CONFIG_ZMK_DISPLAY_INVERT=y

# Uncomment to disable display blanking on idle
# CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Uncomment to show battery percentage
# CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Uncomment to show WPM widget
# CONFIG_ZMK_WIDGET_WPM_STATUS=y